name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # ── Job 1: Lint ────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
      - name: Install backend dependencies
        run: npm ci --ignore-scripts
      - name: Run ESLint
        run: npm run lint

  # ── Job 2: Backend import smoke test ─────────────────────────────────────────
  smoke-test:
    name: Backend Import Smoke Test
    runs-on: ubuntu-latest
    env:
      # Provide stub values so env.js does not throw on missing required vars
      GEMINI_API_KEY: stub-ci-key
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
      - name: Install backend dependencies
        # --ignore-scripts skips puppeteer Chrome download (not needed for import tests)
        run: npm ci --ignore-scripts
      - name: Run backend import smoke tests
        run: node tests/smoke.js
      - name: Run backend unit tests (SSRF, auth, schema, CTA, Dart shape)
        run: node tests/unit.js
        env:
          GEMINI_API_KEY: stub-ci-key
          NODE_ENV: test
          HISTORY_API_KEY: ci-history-secret
          JOB_API_KEY: ci-job-secret

  # ── Job 3: Frontend build ─────────────────────────────────────────────────────
  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        # Use npm ci directly in the frontend directory — do NOT rely on root build
        # script which calls npm install (non-deterministic) instead of npm ci.
        working-directory: frontend
        run: npm ci --ignore-scripts
      - name: Build frontend
        working-directory: frontend
        run: npm run build
