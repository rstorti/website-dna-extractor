[build]
  base = "frontend"
  command = "npm run build"
  publish = "dist"

[[redirects]]
  from = "/api/*"
  to = "https://website-dna-extractor-4.onrender.com/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/outputs/*"
  to = "https://website-dna-extractor-4.onrender.com/outputs/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  force = false
